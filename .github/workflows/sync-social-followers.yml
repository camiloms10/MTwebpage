name: Sync Social Followers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync social followers
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_HANDLE: ${{ secrets.YOUTUBE_HANDLE }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          X_SCREEN_NAME: ${{ secrets.X_SCREEN_NAME }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          MANUAL_X_FOLLOWERS: ${{ secrets.MANUAL_X_FOLLOWERS }}
          MANUAL_FACEBOOK_FOLLOWERS: ${{ secrets.MANUAL_FACEBOOK_FOLLOWERS }}
          MANUAL_INSTAGRAM_FOLLOWERS: ${{ secrets.MANUAL_INSTAGRAM_FOLLOWERS }}
          MANUAL_TIKTOK_FOLLOWERS: ${{ secrets.MANUAL_TIKTOK_FOLLOWERS }}
          MANUAL_YOUTUBE_FOLLOWERS: ${{ secrets.MANUAL_YOUTUBE_FOLLOWERS }}
        run: node scripts/sync-social-followers.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/social-followers.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync social followers"
          git push
