name: Sync Beehiiv Posts

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: "Event that triggered the sync"
        required: false
        type: string
      post_id:
        description: "Beehiiv post id"
        required: false
        type: string
      post_slug:
        description: "Beehiiv post slug"
        required: false
        type: string
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync posts from Beehiiv
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: node scripts/sync-beehiiv-posts.mjs

      - name: Log trigger context
        run: |
          echo "event_type=${{ github.event.inputs.event_type }}"
          echo "post_id=${{ github.event.inputs.post_id }}"
          echo "post_slug=${{ github.event.inputs.post_slug }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync Beehiiv posts"
          git push
